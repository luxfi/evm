name: Release Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: lux-build
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/create-release@v1
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        # No GH-hosted arm runners. linux/arm64 cross-compiles on
        # hanzo-build-linux-amd64 (with aarch64-linux-gnu-gcc for CGO).
        # darwin cross-compiles via clang -arch on macos-13.
        include:
          - os: linux
            arch: amd64
            runner: hanzo-build-linux-amd64
          - os: linux
            arch: arm64
            runner: hanzo-build-linux-amd64
          - os: darwin
            arch: amd64
            runner: macos-13
          - os: darwin
            arch: arm64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    env:
      GONOSUMCHECK: '*'
      GONOSUMDB: '*'
      GOPRIVATE: 'github.com/luxfi/*'
      GOPROXY: direct
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      # linux/arm64 cross toolchain (gcc-aarch64-linux-gnu) is baked into
      # ghcr.io/hanzoai/runner:0.1.1, which is the image hanzo-build-linux-amd64
      # ARC pool runs. No inline install needed.
      - name: Build
        run: |
          export GOOS=${{ matrix.os }}
          export GOARCH=${{ matrix.arch }}
          export CGO_ENABLED=1
          export CGO_CFLAGS="-O2 -D__BLST_PORTABLE__"
          if [ "${{ matrix.os }}" = "linux" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
          fi
          if [ "${{ matrix.os }}" = "darwin" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            # macos-13 clang ships Apple Silicon target; use -arch arm64.
            export CC="clang -arch arm64"
            export CXX="clang++ -arch arm64"
          fi
          if [ "${{ matrix.os }}" = "darwin" ] && [ "${{ matrix.arch }}" = "amd64" ]; then
            export CC="clang -arch x86_64"
            export CXX="clang++ -arch x86_64"
          fi
          go build -trimpath -ldflags="-s -w -X github.com/luxfi/evm/plugin/evm.Version=${{ github.ref_name }}" \
            -o evm ./plugin
          tar -czf evm-${{ matrix.os }}-${{ matrix.arch }}.tar.gz evm
      - name: Upload
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: evm-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          asset_name: evm-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          asset_content_type: application/gzip
