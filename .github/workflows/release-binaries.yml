name: Release Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: lux-amd64
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/create-release@v1
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: lux-amd64
          - os: linux
            arch: arm64
            runner: lux-arm64
          - os: darwin
            arch: amd64
            runner: macos-13
          - os: darwin
            arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    env:
      GONOSUMCHECK: '*'
      GONOSUMDB: '*'
      GOPRIVATE: 'github.com/luxfi/*'
      GOPROXY: direct
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: |
          CGO_ENABLED=1 CGO_CFLAGS="-O2 -D__BLST_PORTABLE__" \
            go build -trimpath -ldflags="-s -w -X github.com/luxfi/evm/plugin/evm.Version=${{ github.ref_name }}" \
            -o evm ./plugin
          tar -czf evm-${{ matrix.os }}-${{ matrix.arch }}.tar.gz evm
      - name: Upload
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: evm-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          asset_name: evm-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          asset_content_type: application/gzip
